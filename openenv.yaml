name: it-support-env
description: IT Support Troubleshooting Environment for AI agents

actions:
  - ask_question
  - suggest_fix
  - resolve
  - escalate

observations:
  - problem
  - history
  - status

tasks:
  - id: slow_internet
    problem: "My internet is very slow"
    solution: "restart router"
    keywords:
      - restart
      - router
      - modem
    difficulty: easy
    grader: grade_task

  - id: overheating_laptop
    problem: "My laptop is overheating and shutting down"
    solution: "clean fan"
    keywords:
      - fan
      - clean
      - cooling
    difficulty: medium
    grader: grade_task

  - id: screen_flickering
    problem: "My screen is flickering"
    solution: "update drivers"
    keywords:
      - driver
      - update
      - graphics
    difficulty: hard
    grader: grade_task